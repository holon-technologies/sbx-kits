name: Validate kits

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install current sbx release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            https://api.github.com/repos/docker/sbx-releases/releases/latest \
            | jq -r .tag_name)
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://github.com/docker/sbx-releases/releases/download/${version}/DockerSandboxes-linux.tar.gz" \
            -o /tmp/DockerSandboxes-linux.tar.gz
          tar xzf /tmp/DockerSandboxes-linux.tar.gz -C /tmp
          sudo PREFIX="${HOME}/.docker/sbx" /tmp/docker-sbx/install.sh
          echo "${HOME}/.docker/sbx/bin" >> "$GITHUB_PATH"

      - name: Report sbx version
        run: sbx version

      - name: Validate all kits
        run: ./scripts/validate.sh

      - name: Scan for committed secrets
        run: |
          if git grep -InE \
            '(gh[p]_|github_[p]at_|s[k]-[A-Za-z0-9]|BEGIN [A-Z ]*PRIVATE K[E]Y)'; then
            echo "Potential secret material found" >&2
            exit 1
          fi
